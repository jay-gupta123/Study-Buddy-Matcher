<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Buddy Matcher</title>
  <meta name="description" content="Find study partners and groups by matching strengths and weaknesses.">
  <link rel="icon" href="./assets/logo.svg">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <nav class="nav container">
      <div class="brand">
        <img src="./assets/logo.svg" alt="SBM Logo" class="logo"/>
        <span>Study Buddy Matcher</span>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu" id="navToggle">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#/" data-link>Home</a></li>
        <li><a href="#/match" data-link>Match</a></li>
        <li><a href="#/groups" data-link>Groups</a></li>
        <li><a href="#/leaderboard" data-link>Leaderboard</a></li>
        <li><a href="#/about" data-link>About</a></li>
        <li class="auth-links">
          <a href="#/login" id="loginLink">Login</a>
          <a href="#/signup" class="btn btn-sm btn-primary" id="signupLink">Sign up</a>
        </li>
        <li class="profile-menu hidden" id="profileMenu">
          <button id="profileBtn" class="avatar-btn" title="Open profile menu"><span id="avatarDot"></span></button>
          <div class="profile-dropdown" id="profileDropdown">
            <a href="#/dashboard">Dashboard</a>
            <a href="#/profile">Edit Profile</a>
            <a href="#/settings">Settings</a>
            <button id="logoutBtn" class="danger">Logout</button>
          </div>
        </li>
        <li>
          <button id="themeToggle" class="btn btn-icon" title="Toggle theme">🌓</button>
        </li>
      </ul>
    </nav>
  </header>

  <main id="app" class="container"></main>

  <footer class="app-footer">
    <div class="container">
      <p>© <span id="year"></span> Study Buddy Matcher • React, Node.js, Firebase Firestore, CSS, GitHub
        Build By jay Gupta, kartikeya Mahesh Yadav </p>
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
